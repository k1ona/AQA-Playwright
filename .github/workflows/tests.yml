name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: ruff lint
        run: uv run ruff check .
      - name: ruff format check
        run: uv run ruff format --check .
      - name: mypy
        run: uv run mypy .

  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      NOTES_EMAIL: ${{ secrets.NOTES_EMAIL }}
      NOTES_PASSWORD: ${{ secrets.NOTES_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv sync --group dev
          uv run playwright install --with-deps

      - name: Download Allure history from previous run
        uses: actions/download-artifact@v4
        with:
          name: allure-history
          path: reports/allure-results/history
        continue-on-error: true

      - name: Run tests
        # -n auto: distribute tests across available CPU cores via pytest-xdist.
        # Each worker writes its own UUID-named result files to --alluredir, so
        # there is no write collision and Allure history merging is unaffected —
        # that happens in the "Generate Allure report" step below, after all
        # workers have finished.
        run: uv run pytest --alluredir=reports/allure-results -n auto --disable-warnings -q

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.13
        with:
          allure_results: reports/allure-results
          allure_report: reports/allure-report
          allure_history: reports/allure-results/history

      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report
          retention-days: 30

      - name: Upload Allure history for next run
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: reports/allure-results/history
          retention-days: 90
