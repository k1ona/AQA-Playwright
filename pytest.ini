[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Global switches: Enforce auto-generating HTML reports and piping Allure outputs on execution
addopts = 
    --html=reports/report.html 
    --self-contained-html 
    --alluredir=reports/allure-results 
    -v 
    --tb=short
    --tracing=retain-on-failure
    --browser chromium

# Structural marker tags for your AI agents to prioritize execution routines
markers =
    smoke: Critical operational paths (login, checkout, etc.)
    regression: Core structural test suites
    auth: Complex session tracking and authentication flow checks
