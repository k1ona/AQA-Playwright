[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure-results
    -v
    --tb=short
    --tracing=retain-on-failure
    --browser chromium
    -m "not integration"

markers =
    smoke: Critical operational paths (login, checkout, etc.)
    regression: Core structural test suites
    auth: Complex session tracking and authentication flow checks
    integration: Requires local infrastructure (e.g. Postgres, practice app) not available in CI
