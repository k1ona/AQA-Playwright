repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        # Runs against the whole project once, not file-by-file.
        # Uses the uv-managed venv so all stubs (types-requests, etc.) are available.
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [.]
